<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Codex Relay social preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#052e2b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="84" y="76" width="1112" height="568" rx="32" fill="#0b1220" stroke="#1f3b4d"/>

  <g transform="translate(130 118)">
    <text x="0" y="0" fill="#e5f9ff" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="60" font-weight="800">Codex Relay</text>
    <text x="0" y="52" fill="#8dd8d3" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="28">Run Codex on your Mac from Telegram.</text>
    <text x="0" y="112" fill="#dbeafe" font-family="Inter, SF Mono, Menlo, monospace" font-size="22">Telegram -&gt; Codex CLI -&gt; Computer Use -&gt; your Mac</text>
  </g>

  <g transform="translate(116 270)" filter="url(#shadow)">
    <rect x="0" y="0" width="330" height="300" rx="36" fill="#111827" stroke="#334155" stroke-width="2"/>
    <rect x="20" y="24" width="290" height="252" rx="24" fill="#0f172a"/>
    <text x="44" y="68" fill="#e0f2fe" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="20" font-weight="700">Telegram</text>
    <rect x="44" y="94" width="182" height="38" rx="18" fill="#1d4ed8"/>
    <text x="62" y="119" fill="#ffffff" font-family="Inter, SF Mono, Menlo, monospace" font-size="16">/tools</text>
    <rect x="44" y="148" width="238" height="72" rx="18" fill="#155e75"/>
    <text x="62" y="174" fill="#ecfeff" font-family="Inter, SF Mono, Menlo, monospace" font-size="15">Computer Use: ok</text>
    <text x="62" y="196" fill="#ecfeff" font-family="Inter, SF Mono, Menlo, monospace" font-size="15">Telegram: running</text>
  </g>

  <g transform="translate(486 258)">
    <text x="0" y="70" fill="#67e8f9" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="700">-&gt;</text>
  </g>

  <g transform="translate(600 246)" filter="url(#shadow)">
    <rect x="0" y="0" width="490" height="326" rx="26" fill="#020617" stroke="#334155" stroke-width="2"/>
    <rect x="0" y="0" width="490" height="42" rx="26" fill="#111827"/>
    <circle cx="32" cy="21" r="7" fill="#ef4444"/>
    <circle cx="56" cy="21" r="7" fill="#f59e0b"/>
    <circle cx="80" cy="21" r="7" fill="#22c55e"/>
    <text x="28" y="82" fill="#93c5fd" font-family="Inter, SF Mono, Menlo, monospace" font-size="17">$ codex exec --model gpt-5.5</text>
    <text x="28" y="124" fill="#d1fae5" font-family="Inter, SF Mono, Menlo, monospace" font-size="17">LaunchAgent: running</text>
    <text x="28" y="158" fill="#d1fae5" font-family="Inter, SF Mono, Menlo, monospace" font-size="17">Sandbox: danger-full-access</text>
    <text x="28" y="192" fill="#d1fae5" font-family="Inter, SF Mono, Menlo, monospace" font-size="17">Thread: school</text>
    <text x="28" y="226" fill="#fef3c7" font-family="Inter, SF Mono, Menlo, monospace" font-size="17">Mac apps + files + repos + tools</text>
    <rect x="28" y="260" width="248" height="34" rx="17" fill="#0e7490"/>
    <text x="48" y="283" fill="#ecfeff" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="16" font-weight="700">Local. Private. Live.</text>
  </g>

  <text x="130" y="626" fill="#bae6fd" font-family="Inter, SF Mono, Menlo, monospace" font-size="22">git clone ... &amp;&amp; ./scripts/install.sh</text>
</svg>
